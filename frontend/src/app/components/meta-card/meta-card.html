<div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
  <div class="flex items-center gap-2 mb-2">
    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">{{ label() }}</span>
    @if (value()) {
      <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
    } @else {
      <span class="w-2 h-2 rounded-full bg-red-400"></span>
    }
  </div>
  @if (value()) {
    <p class="text-slate-800 text-sm font-medium leading-snug line-clamp-3">{{ value() }}</p>
    <div class="mt-2 space-y-1">
      <div class="flex items-center justify-between">
        <p class="text-xs" [class]="inRange() ? 'text-emerald-600' : 'text-amber-500'">
          {{ value().length }} chars
          <span class="text-slate-400 font-normal">(ideal: {{ minChars() }}–{{ maxChars() }})</span>
        </p>
      </div>
      <div class="h-1.5 rounded-full bg-slate-100 overflow-hidden">
        <div
          class="h-full rounded-full transition-all duration-500"
          [class]="inRange() ? 'bg-emerald-400' : 'bg-amber-400'"
          [style.width.%]="barPercent()"
        ></div>
      </div>
    </div>
  } @else {
    <p class="text-slate-400 text-sm italic">Not found</p>
  }
</div>
