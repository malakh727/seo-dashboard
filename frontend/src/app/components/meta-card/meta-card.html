<div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
  <div class="flex items-center gap-2 mb-2">
    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">{{ label() }}</span>
    @if (value()) {
      <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
    } @else {
      <span class="w-2 h-2 rounded-full bg-red-400"></span>
    }
  </div>
  @if (value()) {
    <p class="text-slate-800 text-sm font-medium leading-snug line-clamp-3">{{ value() }}</p>
    <p class="text-slate-400 text-xs mt-2">{{ value().length }} characters</p>
  } @else {
    <p class="text-slate-400 text-sm italic">Not found</p>
  }
</div>
