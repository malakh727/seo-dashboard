<div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
  <div class="flex items-center justify-between mb-2">
    <h2 class="text-sm font-semibold text-slate-700">SEO Checklist</h2>
    <span class="text-xs font-semibold tabular-nums text-slate-500">{{ totalScore() }}/{{ totalMax() }} pts</span>
  </div>

  <!-- Overall progress bar -->
  <div class="h-2 rounded-full bg-slate-100 overflow-hidden mb-4">
    <div
      class="h-full rounded-full transition-all duration-700"
      [class]="totalPercent() >= 70 ? 'bg-emerald-400' : totalPercent() >= 40 ? 'bg-amber-400' : 'bg-red-400'"
      [style.width.%]="totalPercent()"
    ></div>
  </div>

  <div class="divide-y divide-slate-100">
    @for (item of items(); track item.label; let i = $index) {
      <div class="py-2.5 check-item" [style.animation-delay]="i * 60 + 'ms'">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            @if (item.passed) {
              <svg class="w-4 h-4 text-emerald-500 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
              </svg>
            } @else {
              <svg class="w-4 h-4 text-red-400 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
              </svg>
            }
            <span class="text-sm text-slate-700">{{ item.label }}</span>
            @if (getTipId(item.label)) {
              <a
                [routerLink]="['/tips']"
                [fragment]="getTipId(item.label)!"
                class="ml-1 shrink-0 w-4 h-4 rounded-full bg-slate-100 hover:bg-indigo-100 text-slate-400 hover:text-indigo-600 flex items-center justify-center text-[9px] font-bold transition-colors"
                title="Learn more"
              >?</a>
            }
          </div>
          <span
            class="text-xs font-semibold tabular-nums shrink-0 ml-2"
            [class]="item.passed ? 'text-emerald-600' : 'text-slate-400'"
          >
            {{ item.points }}/{{ item.maxPoints }}
          </span>
        </div>
        <!-- Per-item mini bar -->
        <div class="mt-1.5 ml-7 h-1 rounded-full bg-slate-100 overflow-hidden">
          <div
            class="h-full rounded-full transition-all duration-500"
            [class]="item.passed ? 'bg-emerald-300' : 'bg-slate-200'"
            [style.width.%]="item.passed ? 100 : 0"
          ></div>
        </div>
      </div>
    }
  </div>
</div>
