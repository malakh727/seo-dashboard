<div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
  <label for="url-input" class="block text-sm font-semibold text-slate-700 mb-3">
    Enter Website URL
  </label>
  <div class="flex gap-3">
    <input
      id="url-input"
      type="url"
      [(ngModel)]="url"
      (keydown.enter)="submit()"
      placeholder="https://example.com"
      class="flex-1 border border-slate-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
    />
    <button
      (click)="submit()"
      [disabled]="loading()"
      class="bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed text-white px-6 py-3 rounded-xl text-sm font-semibold transition-colors min-w-28 flex items-center justify-center gap-2"
    >
      @if (loading()) {
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Analyzing
      } @else {
        Analyze
      }
    </button>
  </div>
</div>
