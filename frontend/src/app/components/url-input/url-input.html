<div class="bg-linear-to-br from-indigo-50 to-white rounded-2xl border border-indigo-100 shadow-sm p-6">
  <div class="flex items-center gap-2 mb-4">
    <svg class="w-4 h-4 text-indigo-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
    </svg>
    <label for="url-input" class="block text-sm font-semibold text-slate-700">
      Enter Website URL
    </label>
  </div>
  <div class="flex gap-3">
    <input
      id="url-input"
      type="url"
      [(ngModel)]="url"
      (keydown.enter)="submit()"
      placeholder="https://example.com"
      class="flex-1 border border-slate-200 bg-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition shadow-sm"
    />
    <button
      (click)="submit()"
      [disabled]="loading()"
      class="bg-linear-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 disabled:opacity-60 disabled:cursor-not-allowed text-white px-6 py-3 rounded-xl text-sm font-semibold transition-all shadow-sm hover:shadow-md min-w-28 flex items-center justify-center gap-2"
    >
      @if (loading()) {
        <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        Analyzing
      } @else {
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        Analyze
      }
    </button>
  </div>
  <p class="mt-3 text-xs text-slate-400">Try: github.com · vercel.com · tailwindcss.com</p>
</div>
