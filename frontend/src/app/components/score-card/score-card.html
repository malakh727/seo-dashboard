<div
  class="bg-white rounded-2xl border shadow-sm p-6 flex flex-col items-center justify-center"
  [class]="borderClass()"
>
  <div class="text-6xl font-black" [class]="colorClass()">{{ score() }}</div>
  <div class="text-slate-400 text-xs mt-1">out of 100</div>
  <div class="mt-3 px-3 py-1 rounded-full text-xs font-semibold" [class]="badgeClass()">
    {{ label() }}
  </div>
  <div class="text-slate-400 text-xs mt-2">SEO Score</div>
</div>
