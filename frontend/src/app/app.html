<div class="min-h-screen bg-slate-50">
  <header class="bg-white shadow-sm border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-6 py-5">
      <h1 class="text-2xl font-bold text-slate-800">SEO Analytics Dashboard</h1>
      <p class="text-sm text-slate-500 mt-0.5">Analyze SEO elements of any webpage instantly</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-6 py-8 space-y-5">
    <app-url-input [loading]="loading()" (analyze)="onAnalyze($event)" />

    @if (error()) {
      <div class="bg-red-50 border border-red-200 rounded-2xl p-4 flex items-start gap-3">
        <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
        </svg>
        <p class="text-red-700 text-sm">{{ error() }}</p>
      </div>
    }

    @if (result(); as r) {
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <app-score-card [score]="r.score" />
        <app-meta-card label="Page Title" [value]="r.title" />
        <app-meta-card label="Meta Description" [value]="r.metaDescription" />
      </div>

      <app-seo-checklist [items]="r.scoreBreakdown" />

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <app-headings-card title="H1 Headings" [headings]="r.h1" />
        <app-headings-card title="H2 Headings" [headings]="r.h2" />
      </div>
    }
  </main>
</div>
